<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Force fresh page fetch -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="namma_turfy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Google Sign In Client ID -->
  <meta name="google-signin-client_id" content="685968369147-m46gv5a01fchlsoo8i8262818e8tm2qh.apps.googleusercontent.com">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>namma_turfy</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    function _isMobileBrowser() {
      return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }

    // Store booking metadata before redirect (sessionStorage survives reload).
    window.storeRazorpayBookingData = function(orderId, meta) {
      sessionStorage.setItem('rzp_meta_' + orderId, JSON.stringify(meta));
    };

    // Retrieve booking metadata after redirect callback.
    window.getRazorpayBookingData = function(orderId) {
      var raw = sessionStorage.getItem('rzp_meta_' + orderId);
      if (!raw) return null;
      sessionStorage.removeItem('rzp_meta_' + orderId); // consume once
      return JSON.parse(raw);
    };

    // Bridge called by Flutter web to open Razorpay checkout.
    // Desktop: opens modal (requires direct user-gesture tap).
    // Mobile:  uses redirect flow (modal unreliable on mobile browsers).
    window.openRazorpay = function(options, onSuccess, onError) {
      console.log('[rzp_bridge] Opening Razorpay with options:', options);
      
      if (typeof Razorpay === 'undefined') {
        console.error('[rzp_bridge] Razorpay SDK not loaded');
        onError(0, 'Razorpay SDK not loaded');
        return;
      }

      var rzpOptions = {
        key: options.key,
        amount: options.amount,
        currency: options.currency,
        order_id: options.order_id,
        name: options.name || 'Namma Turfy',
        description: options.description || 'Venue Booking',
        prefill: options.prefill || {},
        theme: { color: '#35CA67' },
      };

      // Force redirect flow on mobile devices or small screens.
      var useRedirect = _isMobileBrowser() || window.innerWidth <= 768;
      console.log('[rzp_bridge] useRedirect:', useRedirect);

      if (useRedirect) {
        rzpOptions.redirect = true;
        rzpOptions.callback_url = window.location.origin + '/payment-callback';
        console.log('[rzp_bridge] Initializing redirect flow to:', rzpOptions.callback_url);
      } else {
        rzpOptions.handler = function(response) {
          console.log('[rzp_bridge] Payment success:', response);
          onSuccess(
            response.razorpay_payment_id,
            response.razorpay_order_id,
            response.razorpay_signature
          );
        };
        rzpOptions.modal = {
          ondismiss: function() { 
            console.log('[rzp_bridge] Payment modal dismissed');
            onError(0, 'Payment cancelled'); 
          }
        };
      }

      try {
        var rzp = new Razorpay(rzpOptions);
        rzp.open();
      } catch (e) {
        console.error('[rzp_bridge] Exception during rzp.open():', e);
        onError(0, 'Internal SDK error');
      }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
