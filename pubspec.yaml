name: namma_turfy
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  dio: ^5.9.2
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter
  flutter_gen: ^5.13.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.2
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  qr_flutter: ^4.1.0
  razorpay_flutter: ^1.4.3
  riverpod_annotation: ^4.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.13.1
  flutter_gen_runner: ^5.13.0+1
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    favicon_path: "assets/images/favicon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
